<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPL Prediction Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .results {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .results h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .player-card {
            background: #f8f9ff;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-info h4 {
            color: #333;
            margin-bottom: 5px;
        }

        .player-info p {
            color: #666;
            font-size: 0.9rem;
        }

        .player-stats {
            text-align: right;
        }

        .points {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .price {
            color: #28a745;
            font-weight: 600;
        }

        .status {
            padding: 20px;
            margin: 10px 0;
            border-radius: 10px;
            text-align: center;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #cce7ff;
            color: #004085;
            border: 1px solid #b8daff;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚽ FPL Prediction Dashboard</h1>
            <p>AI-Powered Fantasy Premier League Optimization</p>
        </div>

        <div class="dashboard">
            <div class="card">
                <h3>🎯 Top Player Predictions</h3>
                <div class="input-group">
                    <label for="topN">Number of players:</label>
                    <input type="number" id="topN" value="10" min="1" max="50">
                </div>
                <button class="btn" onclick="getTopPredictions()">Get Predictions</button>
            </div>

            <div class="card">
                <h3>🏆 Optimize Squad</h3>
                <div class="input-group">
                    <label for="budget">Budget (£m):</label>
                    <input type="number" id="budget" value="100" min="80" max="120" step="0.1">
                </div>
                <button class="btn" onclick="optimizeSquad()">Optimize Team</button>
            </div>

            <div class="card">
                <h3>📊 Player Analysis</h3>
                <div class="input-group">
                    <label for="playerName">Player name:</label>
                    <input type="text" id="playerName" placeholder="e.g. Haaland, Salah">
                </div>
                <button class="btn" onclick="analyzePlayer()">Analyze Player</button>
            </div>

            <div class="card">
                <h3>⚡ Current Gameweek</h3>
                <button class="btn" onclick="getCurrentGameweek()">Get Gameweek Info</button>
            </div>
        </div>

        <div id="results" class="results" style="display: none;">
            <h3>Results</h3>
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        
        function showResults(content) {
            document.getElementById('results').style.display = 'block';
            document.getElementById('resultsContent').innerHTML = content;
        }

        function showLoading() {
            showResults('<div class="loading">🔄 Loading...</div>');
        }

        function showError(message) {
            showResults(`<div class="status error">❌ Error: ${message}</div>`);
        }

        async function apiCall(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return await response.json();
            } catch (error) {
                throw new Error(`API call failed: ${error.message}`);
            }
        }

        async function getTopPredictions() {
            showLoading();
            try {
                const topN = document.getElementById('topN').value;
                const data = await apiCall(`/players/predictions?top_n=${topN}`);
                
                let html = `<h4>🌟 Top ${topN} Predicted Players</h4>`;
                data.forEach((player, index) => {
                    html += `
                        <div class="player-card">
                            <div class="player-info">
                                <h4>#${index + 1} ${player.player_name}</h4>
                                <p>${player.team} • ${player.position}</p>
                            </div>
                            <div class="player-stats">
                                <div class="points">${player.predicted_points} pts</div>
                                <div class="price">£${player.price}m</div>
                            </div>
                        </div>
                    `;
                });
                showResults(html);
            } catch (error) {
                showError(error.message);
            }
        }

        async function optimizeSquad() {
            showLoading();
            try {
                const budget = parseFloat(document.getElementById('budget').value);
                const response = await fetch(`${API_BASE}/optimize/squad`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ budget: budget })
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                let html = `
                    <div class="status success">
                        ✅ Optimized Squad (${data.optimization_status})
                    </div>
                    <h4>💰 Budget: £${data.total_cost.toFixed(1)}m / £${budget}m</h4>
                    <h4>📈 Predicted Points: ${data.predicted_points.toFixed(1)}</h4>
                    <h4>👥 Squad (${data.squad.length} players):</h4>
                `;
                
                const positions = ['GK', 'DEF', 'MID', 'FWD'];
                positions.forEach(pos => {
                    const players = data.squad.filter(p => p.position === pos);
                    if (players.length > 0) {
                        html += `<h5>${pos} (${players.length}):</h5>`;
                        players.forEach(player => {
                            html += `
                                <div class="player-card">
                                    <div class="player-info">
                                        <h4>${player.name}</h4>
                                        <p>Team ${player.team}</p>
                                    </div>
                                    <div class="player-stats">
                                        <div class="points">${player.predicted_points.toFixed(1)} pts</div>
                                        <div class="price">£${player.price}m</div>
                                    </div>
                                </div>
                            `;
                        });
                    }
                });
                showResults(html);
            } catch (error) {
                showError(error.message);
            }
        }

        async function analyzePlayer() {
            const playerName = document.getElementById('playerName').value.trim();
            if (!playerName) {
                showError('Please enter a player name');
                return;
            }
            
            showResults(`<div class="status info">🔍 Searching for "${playerName}"...</div>`);
            // This would require implementing player search in the API
            showResults(`<div class="status info">📝 Player analysis feature coming soon! Search for "${playerName}" will be implemented.</div>`);
        }

        async function getCurrentGameweek() {
            showLoading();
            try {
                const data = await apiCall('/gameweek/current');
                const html = `
                    <div class="status success">
                        📅 Current Gameweek Information
                    </div>
                    <div class="player-card">
                        <div class="player-info">
                            <h4>${data.name}</h4>
                            <p>Deadline: ${new Date(data.deadline).toLocaleString()}</p>
                            <p>Status: ${data.is_current ? 'Active' : data.is_finished ? 'Finished' : 'Upcoming'}</p>
                        </div>
                        <div class="player-stats">
                            <div class="points">GW ${data.gameweek}</div>
                        </div>
                    </div>
                `;
                showResults(html);
            } catch (error) {
                showError(error.message);
            }
        }

        // Show API status on load
        window.onload = async function() {
            try {
                await apiCall('/health');
                showResults('<div class="status success">✅ API Server Connected</div>');
            } catch (error) {
                showResults(`
                    <div class="status error">
                        ❌ API Server Not Running<br>
                        <small>Start server with: <code>python run.py</code></small>
                    </div>
                `);
            }
        };
    </script>
</body>
</html>
